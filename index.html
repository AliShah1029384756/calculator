<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator | Ali Shah</title>
  <meta name="description" content="A polished iOS-style calculator with live expression display and full arithmetic operations.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: block;
      min-height: 100vh;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(0, 212, 255, 0.14), transparent 34%),
        radial-gradient(circle at right, rgba(124, 58, 237, 0.12), transparent 28%),
        #09090f;
      font-family: 'Inter', sans-serif;
    }
    .page-shell { max-width: 1120px; margin: 0 auto; }
    .hero {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
      align-items: end;
    }
    .hero-card, .info-card {
      background: rgba(17, 17, 24, 0.84);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 70px rgba(0,0,0,0.45);
    }
    .hero-card { padding: 2rem; }
    .eyebrow {
      display: inline-flex;
      gap: 0.5rem;
      align-items: center;
      padding: 0.35rem 0.8rem;
      border-radius: 999px;
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.18);
      color: #8be9ff;
      font: 700 0.72rem/1 'Syne', sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .hero h1 {
      font: 800 clamp(2.4rem, 5vw, 4.5rem)/0.95 'Syne', sans-serif;
      margin-bottom: 1rem;
      letter-spacing: -0.04em;
      color: #f8fafc;
    }
    .hero p {
      max-width: 56ch;
      color: #a7b0c0;
      font-size: 1rem;
      line-height: 1.7;
    }
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
    }
    .meta {
      padding: 1rem;
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .meta strong { display: block; color: #fff; font: 800 1rem 'Syne', sans-serif; }
    .meta span { color: #94a3b8; font-size: 0.82rem; }
    .app-stage {
      display: grid;
      place-items: center;
      padding: 1rem 0 2rem;
    }
    .app-frame {
      padding: 14px;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(0,212,255,0.16), rgba(124,58,237,0.12));
      box-shadow: 0 30px 80px rgba(0,0,0,0.45);
    }
    @media (max-width: 900px) {
      .hero { grid-template-columns: 1fr; }
      .meta-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <section class="hero">
      <div class="hero-card">
        <div class="eyebrow">UTILITY APP · POLISHED UI</div>
        <h1>Calculator</h1>
        <p>Fast arithmetic with a clean iOS-style interface, live expression display, and tactile operator states. Built as a lightweight but usable daily tool.</p>
      </div>
      <div class="info-card">
        <div class="meta-grid">
          <div class="meta"><strong>Live</strong><span>Expression feedback</span></div>
          <div class="meta"><strong>Smart</strong><span>Sign and percent controls</span></div>
          <div class="meta"><strong>Fast</strong><span>Keyboard-friendly layout</span></div>
        </div>
      </div>
    </section>

    <section class="app-stage">
      <div class="app-frame">
        <div class="calculator">
          <div class="display">
            <div id="expression"></div>
            <div id="result">0</div>
          </div>
          <div class="buttons">
            <button class="btn wide" data-action="clear">AC</button>
            <button class="btn" data-action="sign">+/-</button>
            <button class="btn" data-action="percent">%</button>
            <button class="btn operator" data-value="/">÷</button>

            <button class="btn" data-value="7">7</button>
            <button class="btn" data-value="8">8</button>
            <button class="btn" data-value="9">9</button>
            <button class="btn operator" data-value="*">×</button>

            <button class="btn" data-value="4">4</button>
            <button class="btn" data-value="5">5</button>
            <button class="btn" data-value="6">6</button>
            <button class="btn operator" data-value="-">−</button>

            <button class="btn" data-value="1">1</button>
            <button class="btn" data-value="2">2</button>
            <button class="btn" data-value="3">3</button>
            <button class="btn operator" data-value="+">+</button>

            <button class="btn wide" data-value="0">0</button>
            <button class="btn" data-value=".">.</button>
            <button class="btn equals" data-action="equals">=</button>
          </div>
        </div>
      </div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
